<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interactive DR Provenance Graph v4</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #17202f;
      --muted: #657083;
      --line: #d9dee8;
      --focus: #075985;
      --neighbor: #0f766e;
      --best: #c2410c;
      --gold-soft: #fff3d4;
      --blue-soft: #e6f2fb;
      --green-soft: #e6f5ee;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      align-items: center;
      gap: 16px;
      min-height: 68px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .title-group h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 700;
    }

    .stats {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      align-items: center;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    select,
    button {
      height: 34px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 6px;
      font: inherit;
      font-size: 13px;
    }

    select {
      min-width: 260px;
      padding: 0 10px;
    }

    button {
      padding: 0 11px;
      cursor: pointer;
    }

    button:hover,
    select:hover {
      border-color: #9aa8ba;
    }

    button:focus-visible,
    select:focus-visible,
    .node.interactive-node:focus-visible {
      outline: 3px solid rgba(7, 89, 133, 0.25);
      outline-offset: 2px;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 390px;
      height: calc(100vh - 68px);
      min-height: 560px;
    }

    .graph-pane {
      overflow: auto;
      background:
        linear-gradient(90deg, rgba(217, 222, 232, 0.6) 1px, transparent 1px),
        linear-gradient(180deg, rgba(217, 222, 232, 0.6) 1px, transparent 1px),
        #ffffff;
      background-size: 28px 28px;
    }

    .graph-inner {
      padding: 18px;
      min-width: 100%;
    }

    .provenance-svg {
      display: block;
      width: 1650px;
      max-width: none;
      height: auto;
      background: #ffffff;
      border: 1px solid var(--line);
    }

    .details {
      overflow: auto;
      padding: 20px;
      border-left: 1px solid var(--line);
      background: #fbfcfe;
    }

    .details h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .details h3 {
      margin: 22px 0 9px;
      font-size: 13px;
      line-height: 1.3;
      text-transform: uppercase;
      color: #334155;
    }

    .description {
      margin: 14px 0 0;
      color: #263244;
      font-size: 14px;
      line-height: 1.5;
    }

    .meta-row,
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 11px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: #334155;
      font-size: 12px;
      line-height: 1.2;
    }

    .chip.best {
      border-color: #f1c27b;
      background: var(--gold-soft);
      color: #8a3a0c;
      font-weight: 700;
    }

    .finding {
      padding: 10px 0;
      border-top: 1px solid var(--line);
    }

    .finding:first-child {
      border-top: 0;
    }

    .finding button,
    .edge-row button {
      height: auto;
      min-height: 30px;
      padding: 5px 8px;
      text-align: left;
      background: var(--panel);
    }

    .finding-text,
    .edge-note,
    .source-summary {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .edge-row,
    .source-row {
      padding: 10px 0;
      border-top: 1px solid var(--line);
    }

    .edge-row:first-child,
    .source-row:first-child {
      border-top: 0;
    }

    .edge-label {
      margin-top: 7px;
      font-size: 13px;
      line-height: 1.35;
      color: #263244;
      font-weight: 650;
    }

    .edge-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .source-row a {
      color: var(--focus);
      font-size: 13px;
      font-weight: 650;
      text-decoration: none;
    }

    .source-row a:hover {
      text-decoration: underline;
    }

    .empty-state {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .node.interactive-node {
      cursor: pointer;
    }

    .node,
    .edge {
      transition: opacity 120ms ease, filter 120ms ease;
    }

    .node.dim,
    .edge.dim {
      opacity: 0.12;
    }

    .node.focus > path,
    .node.focus > ellipse,
    .node.focus > polygon {
      stroke: var(--focus) !important;
      stroke-width: 5px !important;
      filter: drop-shadow(0 0 7px rgba(7, 89, 133, 0.35));
    }

    .node.neighbor > path,
    .node.neighbor > ellipse,
    .node.neighbor > polygon {
      stroke: var(--neighbor) !important;
      stroke-width: 3px !important;
    }

    .node.benchmark-best > path,
    .node.benchmark-best > ellipse,
    .node.benchmark-best > polygon {
      stroke: var(--best) !important;
      stroke-width: 5px !important;
      filter: drop-shadow(0 0 8px rgba(194, 65, 12, 0.42));
    }

    .edge.connected path {
      stroke: var(--neighbor) !important;
      stroke-width: 4px !important;
    }

    .edge.connected polygon {
      fill: var(--neighbor) !important;
      stroke: var(--neighbor) !important;
    }

    .edge.connected text {
      fill: var(--neighbor) !important;
      font-weight: 700;
    }

    .edge.benchmark-best-edge path {
      stroke: var(--best) !important;
      stroke-width: 5px !important;
    }

    .edge.benchmark-best-edge polygon {
      fill: var(--best) !important;
      stroke: var(--best) !important;
    }

    .edge.benchmark-best-edge text {
      fill: var(--best) !important;
      font-weight: 700;
    }

    @media (max-width: 980px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .controls {
        justify-content: flex-start;
      }

      .app {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(420px, 58vh) minmax(360px, auto);
        height: auto;
      }

      .details {
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      select {
        min-width: min(100%, 320px);
      }
    }
  </style>
</head>

      const section = make("section");
      section.appendChild(make("h3", "", title));

      if (!edgeList.length) {
        section.appendChild(make("p", "empty-state", "None"));
        container.appendChild(section);
        return;
      }

      edgeList.forEach((edge) => {
        const otherId = direction === "incoming" ? edge.source : edge.target;
        const row = make("div", "edge-row");
        const button = make("button", "", direction === "incoming" ? `${labelById(otherId)} -> ${labelById(selectedId)}` : `${labelById(selectedId)} -> ${labelById(otherId)}`);
        button.type = "button";
        button.addEventListener("click", () => selectNode(otherId, true));
        row.appendChild(button);
        row.appendChild(make("div", "edge-label", edge.edge_label || edge.relation_type || "linked"));
        row.appendChild(make("div", "edge-note", edge.mechanism || edge.notes || ""));
        row.appendChild(make("div", "edge-meta", `${normalizeText(edge.relation_type)} - confidence: ${normalizeText(edge.confidence)}`));
        section.appendChild(row);
      });

      container.appendChild(section);
    }

    function renderEvidence(container, edgeList, selectedId) {
      const keys = uniqueEvidenceKeys(edgeList);
      if (selectedId === BENCHMARK_ID && !keys.includes("CyTOF_DR_benchmark_2023")) {
        keys.unshift("CyTOF_DR_benchmark_2023");
      }
      if (!keys.length) {
        return;
      }

      const section = make("section");
      section.appendChild(make("h3", "", "Evidence"));
      keys.forEach((key) => {
        const item = evidence[key];
        if (!item) {
          return;
        }
        const row = make("div", "source-row");
        const link = make("a", "", item.title || key);
        link.href = item.url || "#";
        link.target = "_blank";
        link.rel = "noreferrer";
        row.appendChild(link);
        if (item.summary) {
          row.appendChild(make("div", "source-summary", item.summary));
        }
        section.appendChild(row);
      });
      container.appendChild(section);
    }

    function renderDetails(id) {
      const node = nodeById.get(id);
      if (!node) {
        return;
      }

      const incoming = edges.filter((edge) => edge.target === id);
      const outgoing = edges.filter((edge) => edge.source === id);
      const connected = incoming.concat(outgoing);
      const root = document.createDocumentFragment();
      const title = make("h2", "", node.label);
      root.appendChild(title);

      const meta = make("div", "meta-row");
      appendChip(meta, String(node.year || ""));
      appendChip(meta, normalizeText(node.role));
      appendChip(meta, normalizeText(node.family));
      appendChip(meta, normalizeText(node.scope));
      if (benchmarkBestIds.has(id)) {
        appendChip(meta, "benchmark-highlighted", "best");
      }
      root.appendChild(meta);

      root.appendChild(make("p", "description", node.notes || "No description available."));

      if (id === BENCHMARK_ID || benchmarkBestIds.has(id)) {
        renderBenchmarkFindings(root, id);
      }

      renderEdgeList(root, "Incoming Links", incoming, "incoming", id);
      renderEdgeList(root, "Outgoing Links", outgoing, "outgoing", id);
      renderEvidence(root, connected, id);

      details.replaceChildren(root);
    }

    function clearHighlight() {
      nodeEls.forEach((element) => {
        element.classList.remove("focus", "neighbor", "dim", "benchmark-best");
      });
      edgeEls.forEach(({ element }) => {
        element.classList.remove("connected", "dim", "benchmark-best-edge");
      });
    }

    function applyHighlight(id) {
      clearHighlight();

      const incoming = edges.filter((edge) => edge.target === id);
      const outgoing = edges.filter((edge) => edge.source === id);
      const connected = incoming.concat(outgoing);
      const neighborIds = new Set();
      const connectedEdgeKeys = new Set();

      connected.forEach((edge) => {
        neighborIds.add(edge.source === id ? edge.target : edge.source);
        connectedEdgeKeys.add(edgeKey(edge));
      });

      const visibleNodeIds = new Set([id, ...neighborIds]);
      if (id === BENCHMARK_ID) {
        benchmarkBestIds.forEach((bestId) => visibleNodeIds.add(bestId));
      }

      nodeEls.forEach((element, nodeId) => {
        if (!visibleNodeIds.has(nodeId)) {
          element.classList.add("dim");
        }
        if (nodeId === id) {
          element.classList.add("focus");
        } else if (neighborIds.has(nodeId)) {
          element.classList.add("neighbor");
        }
        if (id === BENCHMARK_ID && benchmarkBestIds.has(nodeId)) {
          element.classList.add("benchmark-best");
        }
      });

      edgeEls.forEach(({ element, key, source, target }) => {
        if (connectedEdgeKeys.has(key)) {
          element.classList.add("connected");
        } else {
          element.classList.add("dim");
        }
        if (
          id === BENCHMARK_ID &&
          ((source === BENCHMARK_ID && benchmarkBestIds.has(target)) ||
            (target === BENCHMARK_ID && benchmarkBestIds.has(source)))
        ) {
          element.classList.add("benchmark-best-edge");
        }
      });
    }

    function selectNode(id, scrollToNode = false) {
      if (!nodeById.has(id)) {
        return;
      }
      select.value = id;
      applyHighlight(id);
      renderDetails(id);
      if (scrollToNode) {
        const element = nodeEls.get(id);
        element?.scrollIntoView({ block: "center", inline: "center", behavior: "smooth" });
      }
    }

    function resetView() {
      clearHighlight();
      select.value = "";
      details.replaceChildren(
        make("h2", "", "No node selected"),
        make("p", "empty-state", "Choose a node from the menu or select one in the graph.")
      );
    }

    function setZoom(nextZoom) {
      zoom = Math.max(0.28, Math.min(1.65, nextZoom));
      svg.style.width = `${Math.round(viewBoxWidth * zoom)}px`;
    }

    function fitGraph() {
      const availableWidth = Math.max(640, graphPane.clientWidth - 38);
      setZoom(availableWidth / viewBoxWidth);
    }

    document.querySelectorAll("g.node").forEach((group) => {
      const id = directTitleText(group);
      if (!nodeById.has(id)) {
        return;
      }
      nodeEls.set(id, group);
      group.classList.add("interactive-node");
      group.setAttribute("tabindex", "0");
      group.setAttribute("role", "button");
      group.setAttribute("aria-label", labelById(id));
      group.addEventListener("click", (event) => {
        event.stopPropagation();
        selectNode(id);
      });
      group.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          selectNode(id, true);
        }
      });
    });

    document.querySelectorAll("g.edge").forEach((group) => {
      const title = directTitleText(group);
      const parts = title.split("->");
      if (parts.length !== 2) {
        return;
      }
      const source = parts[0].trim();
      const target = parts[1].trim();
      edgeEls.push({ element: group, source, target, key: `${source}->${target}` });
    });

    nodes
      .slice()
      .sort((a, b) => a.label.localeCompare(b.label))
      .forEach((node) => {
        const option = document.createElement("option");
        option.value = node.id;
        option.textContent = node.label;
        select.appendChild(option);
      });

    select.addEventListener("change", () => {
      if (select.value) {
        selectNode(select.value, true);
      } else {
        resetView();
      }
    });

    document.getElementById("benchmarkButton").addEventListener("click", () => selectNode(BENCHMARK_ID, true));
    document.getElementById("resetButton").addEventListener("click", resetView);
    document.getElementById("zoomIn").addEventListener("click", () => setZoom(zoom + 0.12));
    document.getElementById("zoomOut").addEventListener("click", () => setZoom(zoom - 0.12));
    document.getElementById("fitButton").addEventListener("click", fitGraph);
    fitGraph();
  </script>
</body>
</html>
